<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The New Puppy Schedule System — Interactive Planner</title>
<style>
  :root{
    --ink:#2B2420; --ink-soft:#6b6053; --paper:#F4EFE1; --paper-alt:#ECE3CC;
    --pine:#3F5D4F; --pine-deep:#28392F; --marigold:#CE9A3E; --clay:#B96A4E;
    --line:#CBBE9E; --line-soft:#DED4B9; --white:#FFFDF7; --danger:#a4453a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{ font-family:Georgia,'Iowan Old Style','Palatino Linotype',serif; background:var(--paper); color:var(--ink); min-height:100vh; }
  .app{ max-width:1140px; margin:0 auto; padding:24px 20px 80px; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:14px; }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand-text h1{ font-size:21px; margin:0; font-weight:400; }
  .brand-text .tag{ font-family:'Segoe UI',system-ui,sans-serif; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--clay); font-weight:600; }
  .toolbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .btn{ font-family:'Segoe UI',system-ui,sans-serif; font-size:12.5px; font-weight:600; border:1.4px solid var(--pine); background:var(--white); color:var(--pine-deep); padding:9px 14px; border-radius:20px; cursor:pointer; }
  .btn:hover{ background:var(--paper-alt); }
  .btn.primary{ background:var(--pine); color:#fff; }
  .btn.primary:hover{ background:var(--pine-deep); }
  .btn.danger{ border-color:var(--danger); color:var(--danger); }
  .btn.danger:hover{ background:var(--danger); color:#fff; }
  .btn:disabled{ opacity:.4; cursor:not-allowed; }
  input[type=file]{ display:none; }
  .savestate{ font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; color:var(--ink-soft); white-space:nowrap; }
  .savestate.warn{ color:var(--danger); font-weight:600; }
  .savestate.ok{ color:var(--pine-deep); }

  .petbar{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; background:var(--white); border:1px solid var(--line); border-radius:8px; padding:10px 14px; margin-bottom:16px; }
  .petpill{ font-family:'Segoe UI',system-ui,sans-serif; font-size:12.5px; font-weight:600; padding:7px 14px; border-radius:16px; cursor:pointer; border:1.4px solid var(--line); color:var(--pine-deep); background:var(--paper); }
  .petpill.active{ background:var(--pine); border-color:var(--pine); color:#fff; }
  .petbar-note{ font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; color:var(--ink-soft); margin-left:auto; }

  .startdate-bar{ display:flex; align-items:center; gap:10px; background:var(--white); border:1px solid var(--line); border-radius:8px; padding:10px 16px; margin-bottom:16px; font-family:'Segoe UI',system-ui,sans-serif; font-size:12.5px; flex-wrap:wrap; }
  .startdate-bar label{ font-weight:700; color:var(--pine-deep); }
  .startdate-bar input{ border:1px solid var(--line); border-radius:5px; padding:5px 8px; font-family:inherit; font-size:12.5px; }

  .tabs{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:20px; border-bottom:1.4px solid var(--line); padding-bottom:14px; }
  .tab{ font-family:'Segoe UI',system-ui,sans-serif; font-size:11.5px; font-weight:600; padding:8px 12px; border-radius:16px; cursor:pointer; color:var(--pine-deep); background:transparent; border:1.4px solid transparent; white-space:nowrap; }
  .tab:hover{ background:var(--paper-alt); }
  .tab.active{ background:var(--pine); color:#fff; }

  .panel{ display:none; background:var(--white); border:1.4px solid var(--line); border-radius:8px; padding:30px 34px; }
  .panel.active{ display:block; }
  .eyebrow{ font-family:'Segoe UI',system-ui,sans-serif; font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--clay); font-weight:700; margin-bottom:6px; }
  h2.ptitle{ font-size:27px; font-weight:400; margin:0 0 6px 0; }
  .psub{ font-style:italic; color:var(--ink-soft); font-size:13.5px; margin-bottom:18px; line-height:1.5; }
  .stitch{ border-top:1.4px dashed var(--line); margin:18px 0; }

  .box{ border:1px solid var(--line); border-radius:6px; padding:14px 18px; margin-bottom:16px; background:var(--paper); }
  .box.pine{ border-color:var(--pine); background:rgba(63,93,79,0.06); }
  .box.clay{ border-color:var(--clay); background:rgba(185,106,78,0.07); }
  .box.marigold{ border-color:var(--marigold); background:rgba(206,154,62,0.09); }
  .box-h{ font-family:'Segoe UI',system-ui,sans-serif; font-size:10.5px; letter-spacing:.09em; text-transform:uppercase; color:var(--pine-deep); font-weight:700; margin-bottom:6px; }
  .box-b{ font-size:13.5px; line-height:1.6; }

  table{ width:100%; border-collapse:collapse; margin-bottom:6px; }
  th{ font-family:'Segoe UI',system-ui,sans-serif; font-size:10px; letter-spacing:.05em; text-transform:uppercase; background:var(--pine); color:#fff; padding:8px 8px; text-align:left; font-weight:700; }
  td{ border-bottom:1px solid var(--line-soft); padding:6px 8px; font-size:12.8px; vertical-align:middle; }
  tr:nth-child(even) td{ background:rgba(63,93,79,0.035); }
  td input[type=text], td input[type=time], td input[type=date], td textarea{ width:100%; border:none; background:transparent; font-family:inherit; font-size:12.8px; color:var(--ink); padding:4px 2px; resize:none; box-sizing:border-box; overflow-wrap:break-word; overflow-y:auto; }
  td input[type=text]:focus, td input[type=time]:focus, td input[type=date]:focus, td textarea:focus{ outline:none; background:#fff6e0; border-radius:3px; }
  td input.gridcell, td textarea.gridcell{ font-size:15px; font-weight:700; text-align:center; padding:8px 2px; color:var(--pine-deep); }
  .notecell{ color:var(--ink-soft); font-style:italic; font-size:11.8px; }
  .addrow{ font-family:'Segoe UI',system-ui,sans-serif; font-size:11.5px; font-weight:600; color:var(--pine-deep); background:none; border:1.2px dashed var(--pine); border-radius:14px; padding:6px 12px; cursor:pointer; margin-top:8px; }
  .addrow:hover{ background:var(--paper-alt); }
  .addrow:disabled{ opacity:.4; cursor:not-allowed; }
  .addrow.danger-outline{ border-color:var(--danger); color:var(--danger); }
  .addrow.danger-outline:hover{ background:rgba(164,69,58,0.08); }

  .photo-row{ display:flex; align-items:flex-start; gap:20px; margin-bottom:6px; flex-wrap:wrap; }
  .photo-col{ display:flex; flex-direction:column; align-items:center; gap:8px; flex:0 0 auto; }
  .photo-upload{ width:120px; height:120px; border-radius:50%; border:2px dashed var(--line); background:var(--paper); display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden; }
  .photo-upload:hover{ border-color:var(--pine); background:var(--paper-alt); }
  .photo-upload img{ width:100%; height:100%; object-fit:cover; display:block; }
  .photo-placeholder{ font-family:'Segoe UI',system-ui,sans-serif; font-size:10.5px; color:var(--ink-soft); text-align:center; padding:0 10px; line-height:1.4; }
  .photo-placeholder .plus{ font-size:22px; display:block; color:var(--pine); margin-bottom:2px; }
  .photo-remove{ font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; color:var(--danger); background:none; border:none; cursor:pointer; text-decoration:underline; padding:0; }
  .photo-fields{ flex:1; min-width:260px; }
  .pet-thumb{ width:18px; height:18px; border-radius:50%; object-fit:cover; margin-right:6px; vertical-align:middle; }

  .pet-id-badge{ font-family:'Segoe UI',system-ui,sans-serif; font-size:10.5px; color:var(--ink-soft); background:var(--paper-alt); border-radius:5px; padding:5px 10px; display:inline-block; margin-bottom:10px; }
  .select-input{ width:100%; border:1.2px solid var(--line); border-radius:5px; padding:8px 10px; font-family:inherit; font-size:13px; background:#fff; color:var(--ink); }
  .tag-grid{ display:grid; grid-template-columns:1fr 1fr; gap:6px 16px; margin:8px 0 4px; }
  .tag-item{ font-size:12.5px; display:flex; align-items:center; gap:7px; }
  .tag-item input{ width:14px; height:14px; accent-color:var(--pine); }
  .receipt-thumbs{ display:flex; flex-wrap:wrap; gap:8px; margin:8px 0; }
  .receipt-thumb{ position:relative; width:56px; height:56px; border-radius:5px; overflow:hidden; border:1px solid var(--line); }
  .receipt-thumb img{ width:100%; height:100%; object-fit:cover; }
  .receipt-thumb button{ position:absolute; top:0; right:0; background:rgba(164,69,58,0.9); color:#fff; border:none; width:16px; height:16px; font-size:10px; line-height:16px; cursor:pointer; padding:0; }
  .vet-card{ border:1px solid var(--line); border-radius:6px; padding:14px 16px; margin-bottom:12px; background:var(--paper); }
  .vet-card-head{ display:flex; justify-content:space-between; align-items:center; font-family:'Segoe UI',system-ui,sans-serif; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--pine-deep); font-weight:700; margin-bottom:8px; }
  .remove-link{ font-family:'Segoe UI',system-ui,sans-serif; font-size:10.5px; color:var(--danger); background:none; border:none; cursor:pointer; text-decoration:underline; padding:0; }
  .reminder-banner{ background:#fdeeea; border:1.4px solid var(--danger); border-radius:8px; padding:14px 18px; margin-bottom:16px; font-family:'Segoe UI',system-ui,sans-serif; }
  .reminder-banner .rb-title{ font-weight:700; color:var(--danger); font-size:13px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
  .reminder-item{ font-size:12.5px; color:var(--ink); padding:6px 0; border-top:1px solid rgba(164,69,58,0.2); display:flex; justify-content:space-between; align-items:center; gap:10px; }
  .rb-secondary{ font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; font-weight:600; background:transparent; color:var(--ink-soft); border:1.2px solid var(--ink-soft); border-radius:14px; padding:5px 12px; cursor:pointer; white-space:nowrap; }
  .rb-secondary:hover{ background:rgba(107,96,83,0.08); }
  .reminder-item button{ font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; font-weight:600; background:var(--danger); color:#fff; border:none; border-radius:14px; padding:5px 12px; cursor:pointer; white-space:nowrap; }
  .reminder-item button.rb-secondary{ background:transparent; color:var(--ink-soft); border:1.2px solid var(--ink-soft); }
  .rb-dismiss{ background:none; border:none; color:var(--danger); font-size:16px; cursor:pointer; line-height:1; }
  .modal-overlay{ position:fixed; inset:0; background:rgba(43,36,32,0.5); display:flex; align-items:center; justify-content:center; z-index:1000; padding:20px; }
  .modal-box{ background:var(--white); border-radius:10px; padding:22px 26px; max-width:440px; width:100%; max-height:80vh; overflow-y:auto; box-shadow:0 20px 50px rgba(0,0,0,0.3); }
  .must-read{ border:2px solid var(--danger); background:#fdeeea; border-radius:8px; padding:16px 20px; margin-bottom:20px; font-size:13px; line-height:1.55; }
  .must-read-title{ font-family:'Segoe UI',system-ui,sans-serif; font-weight:700; font-size:14px; color:#7a2e24; margin-bottom:8px; }
  .must-read .tick li::before{ color:var(--danger); }

  .clgrid{ display:grid; grid-template-columns:1fr 1fr; gap:8px 20px; }
  .clitem{ font-size:13px; display:flex; align-items:flex-start; gap:9px; padding:5px 0; }
  .clitem input{ margin-top:3px; flex:0 0 auto; width:15px; height:15px; accent-color:var(--pine); cursor:pointer; }
  .clitem label{ cursor:pointer; line-height:1.4; }
  .clitem.done label{ color:var(--ink-soft); text-decoration:line-through; }
  .cat{ font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--pine-deep); font-weight:700; margin:14px 0 6px; }

  .progress-wrap{ background:var(--paper-alt); border-radius:20px; height:10px; overflow:hidden; margin:4px 0 16px; }
  .progress-bar{ background:var(--marigold); height:100%; }
  .progress-label{ font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; color:var(--pine-deep); font-weight:600; }

  .fieldrow{ display:flex; gap:14px; margin-bottom:10px; flex-wrap:wrap; }
  .field{ flex:1; min-width:180px; }
  .field label{ display:block; font-family:'Segoe UI',system-ui,sans-serif; font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--pine-deep); font-weight:700; margin-bottom:4px; }
  .field input, .field textarea{ width:100%; box-sizing:border-box; border:1.2px solid var(--line); border-radius:5px; padding:11px 10px; font-family:inherit; font-size:13px; background:#fff; color:var(--ink); }
  .field textarea{ height:auto; }
  .field input:focus{ outline:none; border-color:var(--pine); }

  .mrow{ border-bottom:1px dotted var(--line); padding:12px 0; }
  .mlabel{ font-family:'Segoe UI',system-ui,sans-serif; font-size:12.5px; font-weight:700; color:var(--pine-deep); margin-bottom:8px; }

  .foot-note{ margin-top:26px; padding-top:16px; border-top:1px solid var(--line); font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; color:var(--ink-soft); text-align:center; }
  ul.tick{ margin:0; padding-left:0; list-style:none; }
  ul.tick li{ font-size:13.5px; line-height:1.6; padding-left:17px; position:relative; margin-bottom:6px; }
  ul.tick li::before{ content:'\25C6'; color:var(--marigold); position:absolute; left:0; font-size:9px; top:6px; }
  .cols2{ display:flex; gap:22px; flex-wrap:wrap; }
  .cols2 > div{ flex:1; min-width:260px; }

  .navbar{ display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-wrap:wrap; background:var(--paper-alt); border-radius:8px; padding:10px 14px; }
  .navbtn{ font-family:'Segoe UI',system-ui,sans-serif; font-size:16px; border:1px solid var(--pine); background:#fff; color:var(--pine-deep); width:30px; height:30px; border-radius:50%; cursor:pointer; line-height:1; }
  .navbtn:disabled{ opacity:.35; cursor:not-allowed; }
  .navsel{ font-family:'Segoe UI',system-ui,sans-serif; font-size:12.5px; border:1px solid var(--line); border-radius:6px; padding:6px 8px; flex:1; min-width:160px; }
  .navlabel{ font-family:'Segoe UI',system-ui,sans-serif; font-size:11.5px; color:var(--pine-deep); font-weight:700; }

  .chartbox{ background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:16px; margin-top:10px; }
  .chartmsg{ font-family:'Segoe UI',system-ui,sans-serif; font-size:12.5px; color:var(--ink-soft); font-style:italic; padding:20px 0; text-align:center; }

  .banner{ font-family:'Segoe UI',system-ui,sans-serif; font-size:12px; background:#fbe9c6; border:1px solid var(--marigold); color:#5c4108; border-radius:8px; padding:10px 16px; margin-bottom:16px; }

  @media print{
    body:not(.printing-summary) .tabs, body:not(.printing-summary) .toolbar, body:not(.printing-summary) .btn, body:not(.printing-summary) .navbar, body:not(.printing-summary) .startdate-bar, body:not(.printing-summary) .petbar{ display:none !important; }
    body:not(.printing-summary) .panel{ display:block !important; border:none; page-break-after:always; }
    body{ background:#fff; }
  }
  #clientSummary{ display:none; }
  body.printing-summary .app > *:not(#clientSummary){ display:none !important; }
  body.printing-summary #clientSummary{ display:block; }
  @media print{
    body.printing-summary #clientSummary{ display:block !important; }
  }
  .cs-page{ max-width:680px; margin:0 auto; padding:20px; font-family:Georgia,serif; color:var(--ink); }
  .cs-head{ display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid var(--pine); padding-bottom:14px; margin-bottom:16px; }
  .cs-org{ font-family:'Segoe UI',system-ui,sans-serif; font-size:10.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--clay); font-weight:700; }
  .cs-name{ font-size:26px; margin:2px 0; }
  .cs-sub{ font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; color:var(--ink-soft); }
  .cs-photo{ width:80px; height:80px; border-radius:8px; object-fit:cover; border:1px solid var(--line); }
  .cs-section-h{ font-family:'Segoe UI',system-ui,sans-serif; font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--pine-deep); font-weight:700; border-bottom:1px solid var(--line); padding-bottom:4px; margin:16px 0 8px; }
  .cs-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px 16px; font-size:12.5px; margin-bottom:6px; }
  .cs-grid div b{ display:block; font-family:'Segoe UI',system-ui,sans-serif; font-size:9.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--pine-deep); }
  .cs-table{ width:100%; border-collapse:collapse; font-size:12px; margin-bottom:6px; }
  .cs-table th{ background:var(--paper-alt); color:var(--pine-deep); font-family:'Segoe UI',system-ui,sans-serif; font-size:9.5px; text-transform:uppercase; padding:5px 7px; text-align:left; }
  .cs-table td{ border-bottom:1px solid var(--line-soft); padding:5px 7px; }
  .cs-sign{ display:flex; gap:30px; margin-top:26px; }
  .cs-sign div{ flex:1; border-top:1px solid var(--ink); padding-top:4px; font-family:'Segoe UI',system-ui,sans-serif; font-size:10px; color:var(--ink-soft); }
  .cs-writeline{ border-bottom:1px solid var(--ink); min-height:26px; margin-top:6px; }
  .cs-notes{ font-size:12.5px; line-height:1.5; min-height:20px; }
  .cs-allergy-warning{ background:#fdeeea; border:1.4px solid var(--danger); border-radius:6px; padding:10px 14px; font-size:13px; font-weight:700; color:#7a2e24; margin-bottom:10px; }
  @media (max-width:640px){
    .panel{ padding:20px 18px; }
    .clgrid{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <svg width="34" height="34" viewBox="0 0 100 100"><ellipse cx="50" cy="64" rx="27" ry="22" fill="#B96A4E"/><ellipse cx="21" cy="31" rx="12" ry="15" transform="rotate(-18 21 31)" fill="#B96A4E"/><ellipse cx="43" cy="15" rx="11.5" ry="14.5" transform="rotate(-6 43 15)" fill="#B96A4E"/><ellipse cx="66" cy="15" rx="11.5" ry="14.5" transform="rotate(6 66 15)" fill="#B96A4E"/><ellipse cx="88" cy="31" rx="12" ry="15" transform="rotate(18 88 31)" fill="#B96A4E"/></svg>
      <div class="brand-text"><div class="tag">HappyMindArts</div><h1>The New Puppy Schedule System</h1></div>
    </div>
    <div class="toolbar">
      <span class="savestate" id="saveStatus">Loading…</span>
      <button class="btn primary" title="Saves everything right now — also happens automatically as you type" onclick="manualSave()">💾 Save</button>
      <button class="btn" title="Downloads a backup file of everything, for every pet" onclick="doExport()">⬇ Export</button>
      <button class="btn" title="Restores data from a previously exported backup file — named like &quot;puppy-schedule-data-2026-07-20.json&quot;; pick the most recent one if you have several" onclick="openImportPicker()">⬆ Import</button>
      <input type="file" id="importFile" accept="application/json" onchange="doImport(event)">
      <button class="btn" title="Print the current tab, or choose Save as PDF" onclick="window.print()">🖨 Print</button>
      <button class="btn danger" title="Permanently clears every pet and every entry — cannot be undone" onclick="resetAll()">⚠ Reset</button>
      <input type="file" id="photoFileInput" accept="image/*" style="display:none" onchange="onPhotoSelected(event)">
      <input type="file" id="receiptFileInput" accept="image/*" multiple style="display:none" onchange="onReceiptFilesSelected(event)">
    </div>
  </div>

  <div id="storageBanner"></div>
  <div id="reminderBanner"></div>
  <div id="backupBanner"></div>
  <div class="petbar" id="petBar"></div>

  <div class="startdate-bar">
    <label for="startDateInput">Home date:</label>
    <input type="date" id="startDateInput">
    <span style="color:var(--ink-soft);">— every day, week, and month label below is calculated from this date. Edit name/breed on the Profile tab.</span>
  </div>

  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>

  <div class="foot-note" id="footNote">
    Licensed for personal use &middot; &copy; 2026 HappyMindArts. All rights reserved. &middot; This planner covers Day 1 through Year 2.
  </div>
  <div id="clientSummary"></div>
</div>

<script>
/* ============================================================ ON-PAGE ERROR DISPLAY (no devtools needed) ============================================================ */
window.__caughtErrors = [];
function showOnPageError(msg, source, line, col){
  window.__caughtErrors.push(msg);
  let box = document.getElementById('__jsErrorBox');
  if(!box){
    box = document.createElement('div');
    box.id = '__jsErrorBox';
    box.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#fdeeea;border-bottom:3px solid #a4453a;color:#7a2e24;font-family:monospace;font-size:12px;padding:12px 16px;white-space:pre-wrap;max-height:40vh;overflow:auto;';
    document.body ? document.body.prepend(box) : document.addEventListener('DOMContentLoaded', ()=>document.body.prepend(box));
  }
  box.textContent = 'Something on this page hit an error. Please screenshot this red box exactly as shown and send it back:\n\n' + window.__caughtErrors.join('\n---\n');
}
window.addEventListener('error', e=>{ showOnPageError((e.message||'unknown error')+' (line '+e.lineno+', col '+e.colno+')'); });
window.addEventListener('unhandledrejection', e=>{ showOnPageError('Promise error: '+(e.reason && e.reason.message ? e.reason.message : e.reason)); });

/* ============================================================ DATE HELPERS ============================================================ */
function parseDate(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function toISO(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function addDays(d, n){ const r = new Date(d); r.setDate(r.getDate()+n); return r; }
function fmtShort(d){ return d.toLocaleDateString(undefined,{month:'short',day:'numeric'}); }
function fmtFull(d){ return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}); }
function todayISO(){ return toISO(new Date()); }
// Resilient date parser: handles proper ISO (from <input type=date>) and, for backward
// compatibility with older free-typed entries, an unformatted 8-digit "YYYYMMDD" fallback.
function safeParseDate(s){
  if(!s) return null;
  const trimmed = String(s).trim();
  // Proper ISO date (what <input type=date> and our own composed dates always produce) —
  // construct explicitly in LOCAL time. new Date(string) parses this as UTC midnight instead,
  // which displays as the PREVIOUS day in any timezone behind UTC — that was the actual bug.
  let m = trimmed.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m){ const d = new Date(Number(m[1]), Number(m[2])-1, Number(m[3])); if(!isNaN(d.getTime())) return d; }
  // Legacy 8-digit fallback (old free-typed entries with no dashes)
  m = trimmed.match(/^(\d{4})(\d{2})(\d{2})$/);
  if(m){ const d = new Date(Number(m[1]), Number(m[2])-1, Number(m[3])); if(!isNaN(d.getTime())) return d; }
  // Last resort for any other format
  const d2 = new Date(trimmed);
  if(!isNaN(d2.getTime())) return d2;
  return null;
}

function mdyDateField(isoValue, onChange){
  const parts = isoValue ? isoValue.split("-") : ["","",""];

  function sync(){
    const yNum = curY?parseInt(curY,10):null;
    const yValid = curY && yNum>=2000 && yNum<=new Date().getFullYear()+1;
    const iso = (curM && curD && yValid) ? (String(curY).padStart(4,"0")+"-"+String(curM).padStart(2,"0")+"-"+String(curD).padStart(2,"0")) : "";

    el("select",{class:"select-input", style:"flex:1.3;padding:8px 4px;", onchange:e=>{curM=e.target.value; sync();}},

  );
}
function generatePetId(){

  for(let i=0;i<5;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return 'PUP-'+s;
}

function phaseEntryDate(phase, unitNumber){

function normalizePet(rawPet){
  const fresh = freshPet(rawPet && rawPet.profile && rawPet.profile.name);
  const pet = Object.assign({}, fresh, rawPet||{});
  pet.profile = Object.assign({}, fresh.profile, rawPet && rawPet.profile || {});
  if(pet.profile.birthdate && !pet.profile.birthYear){
    const [y,m,d] = pet.profile.birthdate.split("-");
    pet.profile.birthYear = y || ""; pet.profile.birthMonth = m?String(parseInt(m,10)):""; pet.profile.birthDay = d?String(parseInt(d,10)):"";
  }
  pet.emergency = Object.assign({}, fresh.emergency, rawPet && rawPet.emergency || {});
  pet.adoptionTags = (rawPet && rawPet.adoptionTags) || {};
  pet.socialChecked = (rawPet && rawPet.socialChecked) || {};
  pet.social = (rawPet && rawPet.social && Object.keys(rawPet.social).length) ? rawPet.social : fresh.social;
  pet.phaseEntries = Object.assign({}, fresh.phaseEntries, rawPet && rawPet.phaseEntries || {});
  pet.phaseCursor = Object.assign({}, fresh.phaseCursor, rawPet && rawPet.phaseCursor || {});
  pet.potty = (rawPet && rawPet.potty) || fresh.potty;
  pet.feed = (rawPet && rawPet.feed) || fresh.feed;
  pet.growth = (rawPet && rawPet.growth) || fresh.growth;
  pet.medications = (rawPet && Array.isArray(rawPet.medications)) ? rawPet.medications : fresh.medications;
  pet.training = (rawPet && rawPet.training) || fresh.training;
  pet.milestones = (rawPet && rawPet.milestones) || fresh.milestones;
  pet.vet = ((rawPet && rawPet.vet) || fresh.vet).map(v => Object.assign({}, freshVetRow(), v, {receipts: (v && Array.isArray(v.receipts)) ? v.receipts : []}));
  pet.petId = (rawPet && rawPet.petId) || fresh.petId;
  pet.bioSummary = (rawPet && rawPet.bioSummary) || "";
  pet.id = (rawPet && rawPet.id) || fresh.id;
  return pet;
}
function normalizeState(rawData){
  if(!rawData || !Array.isArray(rawData.pets) || rawData.pets.length===0) return null;
  const data = { orgName: rawData.orgName || "" };
  data.pets = rawData.pets.map(normalizePet);
  data.currentPetId = data.pets.find(p=>p.id===rawData.currentPetId) ? rawData.currentPetId : data.pets[0].id;
  data.mutedReminders = Array.isArray(rawData.mutedReminders) ? rawData.mutedReminders : [];
  data.autoBackupEnabled = rawData.autoBackupEnabled !== undefined ? rawData.autoBackupEnabled : true;
  data.lastBackupDate = rawData.lastBackupDate || null;
  return data;
}
function loadFromLocal(){
  if(!storageAvailable) return false;
  try{
    let raw = localStorage.getItem(STORAGE_KEY);
    let recoveredFromLegacy = false;
    if(!raw){
      // One-time recovery: earlier builds shared a single un-suffixed key across all three
      // tiers. If this exact tier has never saved under its own key yet, check the old
      // shared key so existing data isn't perceived as lost after the per-tier fix.
      const legacy = localStorage.getItem('puppyScheduleSystemData_v3');
      if(legacy){ raw = legacy; recoveredFromLegacy = true; }
    }
    if(!raw) return false;
    const normalized = normalizeState(JSON.parse(raw));
    if(!normalized) return false;
    state = normalized;
    if(recoveredFromLegacy) saveToLocal(); // adopt it under this tier's own key going forward
    return true;
  }catch(e){ return false; }
}

function el(tag, attrs, ...kids){
  const e = document.createElement(tag);
  for(const k in attrs||{}){
    if(attrs[k]===null || attrs[k]===undefined) continue;
    if(k==="html"){ e.innerHTML = attrs[k]; }
    else if(k.startsWith("on")){ e.addEventListener(k.slice(2), attrs[k]); }
    else e.setAttribute(k, attrs[k]);
  }
  kids.flat().forEach(k=>{ if(k!=null) e.appendChild(typeof k==="string"?document.createTextNode(k):k); });
  return e;
}

function resizeImageFile(file, maxDim, quality, onDone, onError){
  if(!file || !file.type.startsWith('image/')){ if(onError) onError("Please choose an image file (JPG, PNG, etc.)."); return; }
  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.onload = ()=>{
      let w = img.width, h = img.height;
      if(w>=h && w>maxDim){ h = Math.round(h*maxDim/w); w = maxDim; }
      else if(h>w && h>maxDim){ w = Math.round(w*maxDim/h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      onDone(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = ()=>{ if(onError) onError("That image couldn't be read — please try a different file."); };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

/* ============================================================ CLIENT SUMMARY (Pro only) ============================================================ */
function computeAccidentFreeStreak(pet){
  const days = [];
  pet.potty.weeks.forEach(week=>{
    const wStart = addDays(parseDate(pet.startDate), (week.unit-1)*7);
    for(let i=0;i<7;i++){
      let hasAccident=false, hasAny=false;
      POTTY_SLOTS.forEach(slot=>{
        const v = (week.data[slot]||{})[i];
        if(v){ hasAny=true; if(/a/i.test(v.trim())) hasAccident=true; }
      });
      days.push({date: addDays(wStart,i), hasAccident, hasAny});
    }
  });
  days.sort((a,b)=>a.date-b.date);
  let streak = 0;
  for(let i=days.length-1;i>=0;i--){
    if(!days[i].hasAny) continue;
    if(days[i].hasAccident) break;
    streak++;
  }
  return streak;
}
function currentPhaseFor(pet){
  const daysSince = Math.floor((new Date() - parseDate(pet.startDate)) / 86400000);
  for(const ph of PHASES){
    const start = (ph.unitStart-1)*ph.unitDays;
    const end = start + ph.maxUnits*ph.unitDays;
    if(daysSince>=start && daysSince<end) return ph;
  }
  return PHASES[PHASES.length-1];
}
function ageStringFor(pet){
  if(!pet.profile.birthdate) return "age unknown";
  const b = safeParseDate(pet.profile.birthdate);
  if(!b) return "age unknown";
  const days = Math.floor((new Date()-b)/86400000);
  if(days<0 || days>36500) return "age unknown"; // catches implausible years (e.g. a mistyped "0002")
  if(days<60) return Math.floor(days/7)+"-week-old";
  const months = Math.floor(days/30.44);
  if(months<24) return months+"-month-old";
  return Math.floor(months/12)+"-year-old";
}
function generateBioSummary(pet){
  const name = pet.profile.name || "This pup";
  const age = ageStringFor(pet);
  const breed = pet.profile.breed || "lovable mix";
  const suggested = suggestAdoptionTags(pet);
  const tags = ADOPTION_TAGS.filter(t => pet.adoptionTags[t]!==undefined ? pet.adoptionTags[t] : suggested[t]);
  let s = `Meet ${name}, a ${age} ${breed} looking for a loving forever home! `;
  if(tags.length) s += `${name} is ${tags.join(", ").toLowerCase()}. `;
  if(pet.profile.favoriteToy) s += `${name}'s favorite toy is ${pet.profile.favoriteToy}. `;
  if(pet.profile.socializationWins) s += `Recent wins: ${pet.profile.socializationWins}. `;
  if(pet.profile.funTraits) s += `Fun fact: ${pet.profile.funTraits}. `;
  s += `Could ${name} be your next best friend? Reach out to learn more!`;
  return s;
}
function socialItemChecked(pet, cat, item){
  const cid = "sc-"+cat.replace(/\W/g,'')+"-"+item.replace(/\W/g,'');
  return !!pet.socialChecked[cid];
}
function suggestAdoptionTags(pet){
  const masteredSkills = pet.training.filter(t=>t.mastered).map(t=>t.skill);
  const streak = computeAccidentFreeStreak(pet);
  return {
    "Crate trained": masteredSkills.includes("Crate cue"),
    "House trained": streak>=7,
    "Potty training in progress": streak>0 && streak<7,
    "Leash trained": masteredSkills.includes("Loose-leash walking"),
    "Knows basic commands": ["Sit","Down","Come","Stay"].filter(s=>masteredSkills.includes(s)).length>=2,
    "Good with kids": socialItemChecked(pet,"People & Handling","Children (supervised)"),
    "Good with other dogs": socialItemChecked(pet,"Other Animals","One calm, vaccinated adult dog") || socialItemChecked(pet,"Other Animals","A different size/breed of dog"),
    "Good with cats": socialItemChecked(pet,"Other Animals","A cat, if in your household"),
    "Good on car rides": socialItemChecked(pet,"Surfaces & Places","Car rides (short)"),
    "Enjoys new people": socialItemChecked(pet,"People & Handling","Adults in hats / sunglasses"),
  };
}
function suggestSocializationWinsText(pet){
  const wins = [];
  Object.entries(pet.social).forEach(([cat,items])=>{
    items.forEach(item=>{ if(socialItemChecked(pet,cat,item)) wins.push(item.toLowerCase()); });
  });
  if(!wins.length) return "";
  if(wins.length===1) return "Comfortable with "+wins[0]+".";
  return "Comfortable with "+wins.slice(0,-1).join(", ")+", and "+wins[wins.length-1]+".";
}

/* ============================================================ DUE-DATE REMINDERS ============================================================ */
function reminderKey(petId, label, date){ return petId+"|"+label+"|"+date.getTime(); }
function computeDueReminders(){
  const items = [];
  const today = new Date(); today.setHours(0,0,0,0);
  const cutoff = addDays(today, 2);
  state.pets.forEach(pet=>{
    (pet.vet||[]).forEach(v=>{
      if(!v.next) return;
      const d = safeParseDate(v.next);
      if(!d) return;
      d.setHours(0,0,0,0);
      if(d <= cutoff){
        const label = v.visit || "Vet visit";
        const key = reminderKey(pet.id, label, d);
        if((state.mutedReminders||[]).includes(key)) return;
        items.push({ key, petId: pet.id, petName: pet.profile.name || "Unnamed pet", label, date: d, overdue: d < today });
      }
    });
  });
  items.sort((a,b)=>a.date-b.date);
  return items;
}
// Used for calendar EXPORTS only — no 2-day cutoff, so a single export hands off everything on the
// horizon (next week, next month, whenever) to the calendar app's own alarms, not just what's urgent today.
function computeAllUpcomingDueDates(){
  const items = [];
  const today = new Date(); today.setHours(0,0,0,0);
  state.pets.forEach(pet=>{
    (pet.vet||[]).forEach(v=>{
      if(!v.next) return;
      const d = safeParseDate(v.next);
      if(!d) return;
      d.setHours(0,0,0,0);
      const label = v.visit || "Vet visit";
      const key = reminderKey(pet.id, label, d);
      if((state.mutedReminders||[]).includes(key)) return;
      items.push({ key, petId: pet.id, petName: pet.profile.name || "Unnamed pet", label, date: d, overdue: d < today });
    });
  });
  items.sort((a,b)=>a.date-b.date);
  return items;
}

/* ============================================================ WEEKLY BACKUP REMINDER ============================================================ */
function daysSinceLastBackup(){
  if(!state.lastBackupDate) return Infinity;
  const last = safeParseDate(state.lastBackupDate);
  if(!last) return Infinity;
  const today = new Date(); today.setHours(0,0,0,0);
  last.setHours(0,0,0,0);
  return Math.floor((today-last)/86400000);
}
function doAutoBackup(){
  const filename = "puppy-schedule-autobackup-"+todayISO()+".json";
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  state.lastBackupDate = todayISO();
  scheduleAutosave();
  renderBackupBanner();
  alert("Saved as \""+filename+"\"\n\nThis is a separate file from your regular Export, so it won't get mixed up with those. It's safe to delete older auto-backup files from your Downloads folder whenever you like — Import only ever needs your most recent one.");
}
function turnOffBackupReminder(){
  if(!confirm("Turn off the weekly backup reminder? You'll need to remember to Export on your own from here on — that's your call to make, just flagging it.")) return;

function renderBackupBanner(){

  ));

      el("button",{class:"rb-secondary", onclick:turnOffBackupReminder}, "Turn Off Reminders"),

function generateICS(items){
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//HappyMindArts//New Puppy Schedule System//EN'];
  const today = new Date(); today.setHours(0,0,0,0);
  items.forEach(it=>{
    // Overdue items would otherwise land on a past date with a "1 day before" alarm also in
    // the past — meaning it would silently sit there and never actually notify anyone.
    // Reschedule those to today instead, so the alarm can actually fire.
    const dt = it.overdue ? today : it.date;
    const dtStr = dt.getFullYear()+String(dt.getMonth()+1).padStart(2,'0')+String(dt.getDate()).padStart(2,'0');
    lines.push('BEGIN:VEVENT');
    lines.push('UID:'+encodeURIComponent(it.key)+'@happymindarts.puppyplanner');
    lines.push('DTSTART;VALUE=DATE:'+dtStr);
    lines.push('SUMMARY:'+(it.overdue ? 'OVERDUE — ' : '')+it.petName+': '+it.label);
    lines.push('DESCRIPTION:'+(it.overdue ? 'This was due '+fmtFull(it.date)+' — ' : '')+'Due-date reminder from The New Puppy Schedule System');
    lines.push('BEGIN:VALARM');
    lines.push('ACTION:DISPLAY');
    lines.push('DESCRIPTION:Reminder');
    lines.push('TRIGGER:'+(it.overdue ? '-PT0M' : '-P1D'));
    lines.push('END:VALARM');
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}
function exportRemindersToCalendar(){
  const items = computeAllUpcomingDueDates();
  if(!items.length){ alert('No due dates on file yet — add a "Next due" date on the Vet & Emergency tab first.'); return; }
  if(!confirm("Export "+items.length+" due date"+(items.length===1?"":"s")+" to a calendar file now?")) return;
  const blob = new Blob([generateICS(items)], {type:'text/calendar'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'puppy-reminders.ics';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert('Downloaded puppy-reminders.ics with '+items.length+' due date'+(items.length===1?'':'s')+' — every one currently on file, not just what\'s due soon.\n\nSee "How to Import Your Due Dates into a Calendar App" on this tab for exact steps.\n\nStill re-export whenever you add a NEW due date — this only captures what\'s here right now.');

function renderPhase(phase){
  const p = document.getElementById("panel-"+phase.id);
  p.innerHTML = "";
  p.append(...header(phase.eyebrow, phase.title, phase.sub));
  p.append(el("div",{class:"box clay"}, el("div",{class:"box-h"},phase.infoLabel), el("div",{class:"box-b"},phase.infoText)));
  if(phase.cadenceNote){
    p.append(el("div",{class:"box marigold"}, el("div",{class:"box-h"},"How often to update this"), el("div",{class:"box-b"},phase.cadenceNote)));
  }

  ensureFirstEntry(phase);
  const entries = P().phaseEntries[phase.id];
  let idx = Math.min(P().phaseCursor[phase.id]||0, entries.length-1);
  P().phaseCursor[phase.id] = idx;

  const labels = entries.map(e => phase.unitLabel+" "+e.unit+" — "+fmtShort(phaseEntryDate(phase,e.unit)));
  p.append(navBar(labels[idx], idx, entries.length,
    ()=>{ P().phaseCursor[phase.id]=Math.max(0,idx-1); renderPhase(phase); },
    ()=>{ P().phaseCursor[phase.id]=Math.min(entries.length-1,idx+1); renderPhase(phase); },
    labels,
    (i)=>{ P().phaseCursor[phase.id]=i; renderPhase(phase); }
  ));

  const canAdd = entries.length < phase.maxUnits;
  const btnRow = el("div",{style:"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;"});
  btnRow.append(el("button",{class:"addrow", title:"Adds a new "+phase.unitLabel.toLowerCase()+", starting blank", disabled: canAdd?null:"", onclick:()=>{
      const nextUnit = phase.unitStart + entries.length;
      entries.push({unit:nextUnit, times: phase.template.map(()=>"")});
      P().phaseCursor[phase.id] = entries.length-1;
      renderPhase(phase); scheduleAutosave();
    }}, canAdd ? ("+ Add "+phase.unitLabel) : ("Max "+phase.maxUnits+" "+phase.unitLabel.toLowerCase()+"s for this phase reached")));
  if(idx>0){
    btnRow.append(el("button",{class:"addrow", title:"Fills this entry with the same times as the previous one, so you can edit instead of starting blank", onclick:()=>{
      entries[idx].times = entries[idx-1].times.slice();
      renderPhase(phase); scheduleAutosave();
    }}, "📋 Copy from "+phase.unitLabel+" "+entries[idx-1].unit));
  }
  p.append(btnRow);

  const table = el("table",{}, el("thead",{}, el("tr",{}, el("th",{style:"width:14%"},"Time"), el("th",{style:"width:30%"},"What's happening"), el("th",{},"Why / notes"))));
  const tbody = el("tbody",{});
  const entry = entries[idx];
  phase.template.forEach((row,ri)=>{
    const timeInput = el("input",{type:"time", value:entry.times[ri]||"", oninput:e=>{ entry.times[ri]=e.target.value; scheduleAutosave(); }});
    tbody.appendChild(el("tr",{}, el("td",{},timeInput), el("td",{},row.activity), el("td",{class:"notecell"},row.note)));
  });
  table.appendChild(tbody);
  p.append(table);
}

function weekStartDate(weekUnit){ return addDays(parseDate(P().startDate), (weekUnit-1)*7); }

function renderWeeklyLog(tabId, logKey, slots, eyebrow, title, sub, extraFn){
  const p = document.getElementById("panel-"+tabId); p.innerHTML = "";
  p.append(...header(eyebrow, title, sub));

  ensureFirstWeek(logKey);
  const log = P()[logKey];
  let idx = Math.min(log.cursor||0, log.weeks.length-1);
  log.cursor = idx;
  const week = log.weeks[idx];
  const wStart = weekStartDate(week.unit);
  const labels = log.weeks.map(w=>{ const s=weekStartDate(w.unit); return "Week of "+fmtShort(s)+" – "+fmtShort(addDays(s,6)); });

  p.append(navBar(labels[idx], idx, log.weeks.length,
    ()=>{ log.cursor=Math.max(0,idx-1); renderWeeklyLog(tabId,logKey,slots,eyebrow,title,sub,extraFn); },
    ()=>{ log.cursor=Math.min(log.weeks.length-1,idx+1); renderWeeklyLog(tabId,logKey,slots,eyebrow,title,sub,extraFn); },
    labels,
    (i)=>{ log.cursor=i; renderWeeklyLog(tabId,logKey,slots,eyebrow,title,sub,extraFn); }
  ));

  const canAdd = log.weeks.length < 104;
  p.append(el("button",{class:"addrow", title:"Adds a new blank week to track", disabled:canAdd?null:"", onclick:()=>{
      const nextUnit = log.weeks.length ? Math.max(...log.weeks.map(w=>w.unit))+1 : 1;
      log.weeks.push({unit:nextUnit, data:Object.fromEntries(slots.map(s=>[s,{}]))});
      log.cursor = log.weeks.length-1;
      renderWeeklyLog(tabId,logKey,slots,eyebrow,title,sub,extraFn); scheduleAutosave();
    }}, "+ Add Next Week"));

  const table = el("table",{});
  const headRow = el("tr",{}, el("th",{style:"width:15%"},""));
  DAYS.forEach((d,i)=> headRow.appendChild(el("th",{}, d+" "+fmtShort(addDays(wStart,i)))));
  table.appendChild(el("thead",{}, headRow));
  const tbody = el("tbody",{});
  const isShortCode = tabId === "potty";
  slots.forEach(slot=>{
    const displayLabel = (tabId==="feed" && SLOT_DISPLAY_LABELS[slot]) ? SLOT_DISPLAY_LABELS[slot] : slot;
    const tr = el("tr",{}, el("td",{style:"font-weight:700;color:var(--pine-deep);font-family:'Segoe UI',system-ui,sans-serif;font-size:11.5px;"},displayLabel));
    DAYS.forEach((d,i)=>{
      const val = week.data[slot][i] || "";
      const cellInput = isShortCode
        ? el("textarea",{class:"gridcell", rows:"2", oninput:e=>{
            const upper = e.target.value.toUpperCase();
            e.target.value = upper;
            week.data[slot][i]=upper;
            scheduleAutosave();
          }}, val)
        : el("textarea",{rows:"3", oninput:e=>{
            week.data[slot][i]=e.target.value;
            scheduleAutosave();
          }}, val);
      tr.appendChild(el("td",{}, cellInput));
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
  p.append(table);
  if(extraFn) p.append(extraFn());
}

function renderWeightChart(container){
  const pts = P().growth
    .map(g=>({d: safeParseDate(g.date), w: parseFloat(g.weight)}))
    .filter(g=> g.d && !isNaN(g.w))
    .sort((a,b)=>a.d-b.d);
  if(pts.length<2){ container.innerHTML = '<div class="chartmsg">Add at least two dated weight entries in the Feed &amp; Sleep tab\'s Growth Log to see a chart here. Use the calendar picker for the date so it reads correctly.</div>'; return; }
  const W=640,H=220,pad=40;
  const minW = Math.min(...pts.map(p=>p.w)), maxW = Math.max(...pts.map(p=>p.w));
  const wRange = (maxW-minW)||1;
  const minD = pts[0].d.getTime(), maxD = pts[pts.length-1].d.getTime();
  const dRange = (maxD-minD)||1;
  const x = t => pad + (W-2*pad) * ((t-minD)/dRange);
  const y = w => H-pad - (H-2*pad) * ((w-minW)/wRange);
  const linePts = pts.map(p=> x(p.d.getTime())+","+y(p.w)).join(" ");
  const circles = pts.map(p=>`<circle cx="${x(p.d.getTime())}" cy="${y(p.w)}" r="4" fill="#B96A4E"/>`).join("");
  const svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;">
    <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#CBBE9E"/>
    <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${H-pad}" stroke="#CBBE9E"/>
    <polyline points="${linePts}" fill="none" stroke="#3F5D4F" stroke-width="2.5"/>
    ${circles}
    <text x="${pad}" y="${H-14}" font-size="11" fill="#6b6053" font-family="sans-serif">${fmtShort(pts[0].d)}</text>
    <text x="${W-pad}" y="${H-14}" text-anchor="end" font-size="11" fill="#6b6053" font-family="sans-serif">${fmtShort(pts[pts.length-1].d)}</text>
    <text x="${pad-6}" y="${H-pad}" text-anchor="end" font-size="11" fill="#6b6053" font-family="sans-serif">${minW}</text>
    <text x="${pad-6}" y="${pad+4}" text-anchor="end" font-size="11" fill="#6b6053" font-family="sans-serif">${maxW}</text>
  </svg>`;
  container.innerHTML = svg;
}

function renderPottyChart(container){
  const today = new Date(); today.setHours(0,0,0,0);
  const windowStart = addDays(today, -29); // 30-day rolling window, inclusive of today
  let anyDataLogged = false;
  const counts = POTTY_SLOTS.map(slot=>{
    let c = 0;
    P().potty.weeks.forEach(w=>{
      const wStart = weekStartDate(w.unit);
      const cell = w.data[slot] || {};
      Object.entries(cell).forEach(([dayOffset,v])=>{
        if(!v || !v.trim()) return;
        const dayDate = addDays(wStart, parseInt(dayOffset,10));
        if(dayDate < windowStart || dayDate > today) return; // outside the 30-day window
        anyDataLogged = true;
        if(/a/i.test(v.trim())) c++;
      });
    });
    return c;
  });
  if(!anyDataLogged){
    container.innerHTML = '<div class="chartmsg">No potty entries in the last 30 days yet — log a few days in the Potty Log tab and this chart will show which time of day accidents cluster around.</div>';
    return;
  }
  const max = Math.max(...counts);
  const W=640,H=220,pad=40, bw=(W-2*pad)/POTTY_SLOTS.length;
  let bars = "", labels = "";
  counts.forEach((c,i)=>{
    const h = max>0 ? (H-2*pad) * (c/max) : 4; // flat baseline bars when every count is zero, so the chart still reads as "tracked, all clear"
    const x = pad + i*bw + bw*0.15;
    const w = bw*0.7;
    const y = H-pad-h;
    bars += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#CE9A3E" rx="2"/>`;
    bars += `<text x="${x+w/2}" y="${y-6}" text-anchor="middle" font-size="11" fill="#28392F" font-family="sans-serif">${c}</text>`;
    labels += `<text x="${x+w/2}" y="${H-pad+16}" text-anchor="middle" font-size="10" fill="#6b6053" font-family="sans-serif">${POTTY_SLOTS[i]}</text>`;
  });
  const banner = max===0 ? '<div style="font-family:\'Segoe UI\',system-ui,sans-serif;font-size:12.5px;color:var(--pine-deep);font-weight:600;margin-bottom:10px;">🎉 Zero accidents in the last 30 days — nice work!</div>' : '';
  container.innerHTML = banner + `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;">
    <line x1="${pad}" y1="${H-pad}" x2="${W-pad}" y2="${H-pad}" stroke="#CBBE9E"/>
    ${bars}${labels}
  </svg>`;
}

        el("div",{class:"field", style:"flex:3;"}, el("label",{},"Notes"), el("textarea",{rows:"2", oninput:e=>{P().milestones[idx].notes=e.target.value; scheduleAutosave();}}, m.notes)),
      )));
  });
}

/* ============================================================ REFERENCE + TRAINING ============================================================ */
function renderReference(){
  const p = document.getElementById("panel-reference"); p.innerHTML = "";
  p.append(...header("Quick reference","Is This Normal? & Training Log","General guidance only — when in doubt, your vet always has the final word."));
  const cols = el("div",{class:"cols2"},
    el("div",{}, el("div",{class:"box-h"},"Usually just puppyhood"), el("ul",{class:"tick"},
      el("li",{},"Mouthing and nipping during play"), el("li",{},"Crying the first few nights home"),
      el("li",{},"Occasional potty regression during changes or growth spurts"),
      el("li",{},"Increased chewing during teething (roughly months 3–6)"),
      el("li",{},"Brief wariness of a new sound or object"))),
    el("div",{class:"box clay"}, el("div",{class:"box-h"},"Call your vet if you see"), el("div",{class:"box-b"},
      "Vomiting or diarrhea that repeats or contains blood · not eating for 24 hours · limping or crying in pain · unusual lethargy · swallowing something unsafe · anything that feels \u201coff\u201d to you."))
  );
  p.append(cols);
  p.append(el("div",{class:"stitch"}));
  p.append(el("div",{class:"box-h"},"Training log"));
  const table = el("table",{}, el("thead",{}, el("tr",{}, el("th",{},"Command / Skill"), el("th",{},"Started"), el("th",{},"Mastered"), el("th",{},"Notes"))));
  const tbody = el("tbody",{});
  P().training.forEach((row,idx)=>{
    tbody.appendChild(el("tr",{}, el("td",{},row.skill),
      el("td",{}, el("input",{type:"date", value:row.started, oninput:e=>{P().training[idx].started=e.target.value; scheduleAutosave();}})),
      el("td",{}, el("input",{type:"date", value:row.mastered, oninput:e=>{P().training[idx].mastered=e.target.value; scheduleAutosave();}})),
      el("td",{}, el("textarea",{rows:"2", oninput:e=>{P().training[idx].notes=e.target.value; scheduleAutosave();}}, row.notes)),
    ));
  });
  table.appendChild(tbody); p.append(table);
}

/* ============================================================ BUILD / INIT ============================================================ */
function safeRender(label, fn){
  try{ fn(); }
  catch(e){
    console.error("Render failed: "+label, e);
    const panel = document.getElementById("panel-"+label);
    if(panel){ panel.innerHTML = '<div class="chartmsg">This tab hit a snag and couldn\'t load ('+ (e && e.message ? e.message : "unknown error") +'). The rest of the app should still work — try Reset only if this repeats after reloading, and please report this exact message.</div>'; }
  }
}
function buildAll(){
  safeRender("profile", renderProfile);
  safeRender("readme", renderReadMeFirst);
  safeRender("welcome", renderWelcome);
  PHASES.forEach(phase=>safeRender(phase.id, ()=>renderPhase(phase)));
  safeRender("night", renderNight);
  safeRender("potty", ()=>renderWeeklyLog("potty","potty",POTTY_SLOTS,"Fill in as you go","Potty Training Log","One week at a time — the goal isn't a perfect record, it's spotting the pattern.",pottyExtra));
  safeRender("feed", ()=>renderWeeklyLog("feed","feed",FEED_SLOTS,"Fill in as you go","Feeding, Water & Sleep Tracker","Keep an eye on intake and rest — both shift fast in the first six months.",feedExtra));
  safeRender("social", renderSocial);
  safeRender("progress", renderProgress);
  safeRender("vet", renderVet);
  safeRender("milestones", renderMilestones);
  safeRender("reference", renderReference);
  safeRender("license", renderLicense);
  safeRender("settings", renderSettings);
}
function rerenderAll(){
  renderPetBar();
  renderReminderBanner();
  renderBackupBanner();
  document.getElementById("startDateInput").value = P().startDate;
  buildTabsShell();
  buildAll();
}

function init(){
  const found = loadFromLocal();
  hasEverSavedLocally = found;
  if(!storageAvailable){
    document.getElementById("storageBanner").innerHTML =
      '<div class="banner">Autosave isn\'t available in this preview window, so entries will only last while this tab stays open. Open this file directly in your own browser (outside Claude) for automatic saving, or use Export before closing to keep a backup.</div>';
  }
  try{
    renderPetBar();
    renderReminderBanner();
    renderBackupBanner();
    document.getElementById("startDateInput").value = P().startDate;
    document.getElementById("startDateInput").addEventListener("change", e=>{
      P().startDate = e.target.value || todayISO();
      buildAll();
      scheduleAutosave();
    });
    document.getElementById("footNote").innerHTML =
      "Licensed under the " + LICENSE.tier + " terms &middot; &copy; 2026 HappyMindArts. All rights reserved. &middot; This planner covers Day 1 through Year 2.";
    buildTabsShell();
    buildAll();
  } catch(e){
    console.error("init() failed partway through:", e);
  } finally {
    setSaveStatus(found ? "Loaded your saved data" : (storageAvailable ? "No saved data yet" : "Preview mode — export to save"), found?"ok":"");
  }
}
window.addEventListener('beforeunload', (e)=>{
  const statusEl = document.getElementById('saveStatus');
  if(statusEl && statusEl.textContent === 'Saving…'){
    e.preventDefault();
    e.returnValue = '';
  }
});
init();
</script>
